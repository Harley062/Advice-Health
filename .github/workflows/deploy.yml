name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build Images + Deploy (Render)
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/advice-health-backend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/advice-health-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/advice-health-frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/advice-health-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Show pushed image tags
        run: |
          echo "Backend: $REGISTRY/${{ github.repository_owner }}/advice-health-backend:$IMAGE_TAG"
          echo "Frontend: $REGISTRY/${{ github.repository_owner }}/advice-health-frontend:$IMAGE_TAG"

      - name: Trigger Render deploy hook (backend)
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_BACKEND" ]; then
            echo "Secret RENDER_DEPLOY_HOOK_BACKEND não configurado."
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_BACKEND"
          echo "Backend deploy solicitado no Render."

      - name: Trigger Render deploy hook (frontend)
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_FRONTEND" ]; then
            echo "Secret RENDER_DEPLOY_HOOK_FRONTEND não configurado."
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_FRONTEND"
          echo "Frontend deploy solicitado no Render."
