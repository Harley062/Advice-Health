databases:
  - name: advice-health-db
    plan: free
    databaseName: todoapp
    user: todoapp_user

services:
  - type: web
    name: advice-health-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /admin/login/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_HOST
        fromDatabase:
          name: advice-health-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: advice-health-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: advice-health-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: advice-health-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: advice-health-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        sync: false
