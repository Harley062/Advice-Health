databases:
  - name: advice-health-db
    plan: free
    databaseName: todoapp
    user: todoapp_user

services:
  - type: web
    name: advice-health-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /admin/login/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: advice-health-db
          property: connectionString
      - key: DB_SSLMODE
        value: require
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: advice-health-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false
